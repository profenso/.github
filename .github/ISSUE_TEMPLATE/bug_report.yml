name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we recreate this?
      placeholder: |
        1. Go to...
        2. Run...
        3. See error...
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, tool versions, browser — anything relevant.
      placeholder: "macOS 15, Terraform 1.14, Python 3.12"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, error messages, anything that helps.
    validations:
      required: false
