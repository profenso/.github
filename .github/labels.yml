# Organisation-wide label definitions.
# Synced to all repositories by the label-sync workflow.
# To add a label: add it here and the workflow will create it everywhere.
# To rename a label: use the 'aliases' field to migrate the old name.

# --- Type ---
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "enhancement"
  color: "a2eeef"
  description: "New feature or improvement to existing functionality"

- name: "documentation"
  color: "0075ca"
  description: "Documentation only changes"

- name: "chore"
  color: "ededed"
  description: "Maintenance, dependency updates, CI changes"

- name: "question"
  color: "d876e3"
  description: "Further information is requested"

# --- Priority ---
- name: "priority:critical"
  color: "b60205"
  description: "Must be resolved immediately"

- name: "priority:high"
  color: "d93f0b"
  description: "Should be resolved soon"

- name: "priority:medium"
  color: "fbca04"
  description: "Normal priority"

- name: "priority:low"
  color: "0e8a16"
  description: "Nice to have, no urgency"

# --- Status ---
- name: "blocked"
  color: "b60205"
  description: "Blocked by another issue or external dependency"

- name: "stale"
  color: "ededed"
  description: "No recent activity — will be closed if not updated"

- name: "pinned"
  color: "006b75"
  description: "Exempt from stale automation"

- name: "needs-triage"
  color: "fbca04"
  description: "Awaiting initial review and categorisation"

- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"

- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"

- name: "tech-debt"
  color: "e07c1a"
  description: "Technical debt that needs addressing"

# --- Scope ---
- name: "security"
  color: "b60205"
  description: "Security-related issue or change"

- name: "infrastructure"
  color: "1d76db"
  description: "Infrastructure, cloud, or platform change"

- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
