# Organisation-wide label definitions.
# Synced to all repositories by the label-sync workflow.
# To add a label: add it here and the workflow will create it everywhere.
# To rename a label: use the 'aliases' field to migrate the old name.

# --- Status ---
- name: "blocked"
  color: "b60205"
  description: "Blocked by another issue or external dependency"

- name: "stale"
  color: "ededed"
  description: "No recent activity — will be closed if not updated"

- name: "pinned"
  color: "006b75"
  description: "Exempt from stale automation"

- name: "needs-triage"
  color: "fbca04"
  description: "Awaiting initial review and categorisation"

- name: "needs-reproduction"
  color: "fbca04"
  description: "Bug cannot be confirmed without a reproduction case"

- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"

- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"

- name: "help wanted"
  color: "008672"
  description: "Extra attention or community contribution needed"

# --- Scope ---
- name: "security"
  color: "b60205"
  description: "Security-related issue or change"

- name: "infrastructure"
  color: "1d76db"
  description: "Infrastructure, cloud, or platform change"

- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"

- name: "tech-debt"
  color: "e07c1a"
  description: "Technical debt that needs addressing"

- name: "breaking change"
  color: "b60205"
  description: "Introduces a breaking change requiring consumer action"

- name: "performance"
  color: "0075ca"
  description: "Performance-related issue or improvement"

- name: "dependencies"
  color: "0366d6"
  description: "Dependency updates"
