# Close stale issues and pull requests across all repositories.
# This workflow runs from the .github repo and applies org-wide.
# https://github.com/actions/stale

name: Close stale issues and PRs

on:
  # Schedule disabled — stale issues need manual review before automation runs.
  # Re-enable once issues have been triaged:
  # schedule:
  #   - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SCAFFOLD_APP_ID }}
          private-key: ${{ secrets.SCAFFOLD_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/stale@v10
        with:
          repo-token: ${{ steps.app-token.outputs.token }}
          # --- Issues ---
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had activity in the last 30 days. It will be closed in 7 days if no
            further activity occurs. If this issue is still relevant, please
            leave a comment or remove the `stale` label.
          close-issue-message: >
            This issue has been automatically closed due to inactivity. If the
            issue is still relevant, please reopen it.

          # --- Pull Requests ---
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had activity in the last 30 days. It will be closed in 7
            days if no further activity occurs. If this PR is still in progress,
            please push a commit or leave a comment.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            If you'd like to continue this work, please reopen the PR.

          # --- Exemptions ---
          exempt-issue-labels: "pinned,security,blocked"
          exempt-pr-labels: "pinned,security,blocked"
          exempt-all-milestones: true

          # Process up to 50 items per run to stay within API limits
          operations-per-run: 50
